            title: "4. Вашите права (GDPR)"
            intro: "Съгласно Общия регламент за защита на данните (GDPR) имате следните права:"
            item1: "Право на достъп - можете да поискате копие от вашите лични данни"
            item2: "Право на коригиране - можете да коригирате неточни данни"
            item3: "Право на изтриване - можете да поискате изтриване на вашите данни"
            item4: "Право на ограничаване на обработката - можете да ограничите как обработваме вашите данни"
        section5:
            title: "5. Сигурност на данните"
            content: "Вашите данни се съхраняват сигурно в нашата база данни с подходящи технически и организационни мерки за защита срещу неоторизиран достъп, загуба или изтриване. Достъп до вашите данни имат само оторизирани служители, които се нуждаят от тях за изпълнение на своите задължения."
        section6:
            title: "6. Свържете се с нас"
            content: "Ако имате въпроси относно тази политика за поверителност или искате да упражните вашите права, моля свържете се с нас на: <a href=\"mailto:%contact_email%\" style=\"color: #d4a024;\">%contact_email%</a> или <a href=\"tel:%contact_phone_link%\" style=\"color: #d4a024;\">%contact_phone%</a>"
    terms:
        title: "Общи условия за ползване"
        section1:
            title: "1. Приемане на условията"
            content: "Като използвате нашия уебсайт и услуги за резервация на часове, вие се съгласявате с настоящите Общи условия за ползване. Ако не сте съгласни с тези условия, моля не използвайте нашите услуги."
        section2:
            title: "2. Услуги за резервация"
            intro: "Нашата платформа позволява онлайн резервация на часове за барбер услуги. При резервация вие се задължавате да:"
            item1: "Предоставяте точна и актуална информация"
            item2: "Уважавате резервираните часове и да пристигате навреме"
            item3: "Уведомявате ни навреме при отмяна или промяна на резервация"
        section3:
            title: "3. Политика за отмени"
            intro: "За да гарантираме качествено обслужване на всички клиенти, прилагаме следните правила:"
            item1_title: "Отмяна от клиента:"
            item1_content: "Можете да отменяте вашите резервации безплатно до 24 часа преди часа. Отмени в последния момент могат да доведат до ограничаване на бъдещи резервации."
            item2_title: "No-show (неявяване):"
            item2_content: "Ако не се явите на резервирания час без предизвестие, запазваме си правото да ограничим вашите бъдещи резервации или да изискаме предплащане."
            item3_title: "Отмяна от барбера:"
            item3_content: "В редки случаи може да се наложи да отменим вашия час поради непредвидени обстоятелства. В такъв случай ще ви уведомим възможно най-скоро и ще ви предложим алтернативен час."
        section4:
            title: "4. Цени и плащане"
            content: "Цените за нашите услуги са посочени на уебсайта и могат да се променят без предизвестие. Плащането се извършва на място в салона след предоставената услуга. Онлайн резервациите НЕ изискват предплащане, освен ако не е посочено друго."
        section5:
            title: "5. Ограничение на отговорност"
            content: "Barber Shop не носи отговорност за косвени или случайни щети, произтичащи от използването на нашите услуги. Ние полагаме усилия да осигурим безпроблемна работа на системата, но не гарантираме, че услугата ще бъде винаги достъпна или свободна от грешки."
        section6:
            title: "6. Контакти"
            content: "При въпроси относно Общите условия, моля свържете се с нас на: <a href=\"mailto:%contact_email%\" style=\"color: #d4a024;\">%contact_email%</a> или <a href=\"tel:%contact_phone_link%\" style=\"color: #d4a024;\">%contact_phone%</a>"

